name: Deploy Docs

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv python install 3.12

      - run: uv sync

      - run: cd docs && uv run mkdocs build --strict

      # Generate HPNC.md as raw file into built site (after mkdocs build)
      - run: uv run python scripts/generate_hpnc_md.py docs/site/HPNC.md

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - id: deployment
        uses: actions/deploy-pages@v4
