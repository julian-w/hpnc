repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: ruff check
        language: system
        types: [python]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff format
        entry: ruff format --check
        language: system
        types: [python]
        stages: [pre-commit]
      - id: mypy
        name: mypy
        entry: mypy src/
        language: system
        types: [python]
        stages: [pre-commit]
        pass_filenames: false
